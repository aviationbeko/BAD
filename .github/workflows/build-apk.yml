name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://iitaqjoneqnzsgkyyrwi.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_c7dGAhuLChmtYwRluZRn-w_BDZ_7_eW" >> .env

      - name: Install dependencies (legacy peer deps)
        run: npm install --legacy-peer-deps

      - name: Install Capacitor Android
        run: npm install @capacitor/android --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BAD-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BAD Araba Detaylama v1.0.${{ github.run_number }}"
          body: |
            ## 📱 BAD - Araba Detaylama Uygulaması
            APK dosyasını indirip Android telefonunuza yükleyebilirsiniz.
            > Yüklemeden önce Ayarlar > Güvenlik > Bilinmeyen kaynaklar'ı açın
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
